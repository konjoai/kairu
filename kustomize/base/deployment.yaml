apiVersion: apps/v1
kind: Deployment
metadata:
  name: kairu
  labels:
    app: kairu
    version: "0.7.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kairu
  template:
    metadata:
      labels:
        app: kairu
        version: "0.7.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: kairu
          image: ghcr.io/wesleyscholl/kairu:0.7.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          command:
            - kairu
            - serve
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --model
            - mock
            - --log-level
            - info
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
