apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: kairu-staging

# Single replica for staging — lower resource footprint.
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: kairu

images:
  - name: ghcr.io/wesleyscholl/kairu
    newTag: "0.7.0"

commonLabels:
  environment: staging
