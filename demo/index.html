<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>kairu — prism</title>
<meta name="description" content="kairu evaluation prism — one response, eight independent readings." />
<style>
  :root {
    --bg: #06060f;
    --bg-1: #0a0a16;
    --bg-2: #11111e;
    --line: rgba(255,255,255,0.06);
    --line-2: rgba(255,255,255,0.12);
    --text: #ecf0fa;
    --muted: #6a708a;
    --dim: #3f4258;
    --hi: #f8f9ff;
    --beam-helpfulness: #6BFF8E;
    --beam-accuracy:    #9D6BFF;
    --beam-safety:      #4FA8FF;
    --beam-coherence:   #3DDDE6;
    --beam-conciseness: #F5C84B;
    --beam-creativity:  #FF6BD0;
    --beam-groundedness:#5BFFD0;
    --beam-tone:        #FF9466;
    --mono: ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans: -apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font: 15px/1.6 var(--sans);
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(255,255,255,.18); color: var(--hi); }

  /* ── chrome ────────────────────────────────────────────────────────── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 32px; z-index: 50;
    pointer-events: none;
  }
  .mark {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: .14em;
    color: var(--muted);
    pointer-events: auto;
  }
  .mark b { color: var(--hi); font-weight: 600; }

  .pill-group {
    display: flex; gap: 0;
    background: rgba(255,255,255,.03);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px;
    pointer-events: auto;
  }
  .pill {
    background: transparent;
    color: var(--muted);
    border: 0;
    font: 11px/1 var(--mono);
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .25s ease;
  }
  .pill:hover { color: var(--text); }
  .pill.active {
    background: rgba(255,255,255,.08);
    color: var(--hi);
  }

  /* ── stage ─────────────────────────────────────────────────────────── */
  main {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 24px 40px;
    gap: 24px;
  }
  .stage {
    position: relative;
    width: 100%;
    max-width: 1400px;
    aspect-ratio: 2 / 1;
    margin: 0 auto;
    pointer-events: none;
  }
  .stage svg { width: 100%; height: 100%; display: block; }

  /* The whole prism group rotates idly; click triggers a separate flash. */
  .prism-group {
    transform-origin: 700px 350px;
    animation: prism-idle 22s linear infinite;
  }
  @keyframes prism-idle {
    0%   { transform: rotate(-2deg); }
    50%  { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
  }
  .prism-group.flashing { animation: prism-flash .9s cubic-bezier(.4,.1,.4,1); }
  @keyframes prism-flash {
    0%   { filter: drop-shadow(0 0 0 rgba(255,255,255,0)); transform: scale(1) rotate(-2deg); }
    20%  { filter: drop-shadow(0 0 28px rgba(255,255,255,.8)) drop-shadow(0 0 60px rgba(255,255,255,.4)); transform: scale(1.04) rotate(0deg); }
    100% { filter: drop-shadow(0 0 0 rgba(255,255,255,0)); transform: scale(1) rotate(-2deg); }
  }

  /* ── incident beam pulses faintly while idle ───────────────────────── */
  .incident { animation: incident-pulse 4s ease-in-out infinite; }
  @keyframes incident-pulse {
    0%, 100% { opacity: .55; }
    50%      { opacity: .9; }
  }

  /* ── outgoing beams ────────────────────────────────────────────────── */
  .beam {
    transition: opacity .9s cubic-bezier(.2,.8,.2,1),
                stroke-width .9s cubic-bezier(.2,.8,.2,1);
    pointer-events: stroke;
    cursor: pointer;
  }
  .beam.unlit { opacity: .12; }
  .beam.lit   { opacity: var(--beam-opacity, .95); }
  .beam-reveal { animation: beam-reveal 1s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes beam-reveal {
    0%   { stroke-dasharray: 0 1200; opacity: 0; }
    40%  { opacity: 1; }
    100% { stroke-dasharray: 1200 0; opacity: var(--beam-opacity, .95); }
  }
  .beam-pair-b { stroke-dasharray: 6 5; }

  /* ── input panels ──────────────────────────────────────────────────── */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    pointer-events: auto;
  }
  .panels.ab { grid-template-columns: 1fr 1fr 1fr; }
  .panel {
    position: relative;
    background: linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,.01));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px 18px;
    transition: border-color .3s ease, background .3s ease;
  }
  .panel:focus-within {
    border-color: var(--line-2);
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
  }
  .panel textarea {
    width: 100%;
    min-height: 92px;
    background: transparent;
    border: 0;
    outline: 0;
    resize: vertical;
    color: var(--text);
    font: 14px/1.55 var(--sans);
    caret-color: var(--hi);
  }
  .panel textarea::placeholder { color: var(--dim); }
  .panel-tag {
    position: absolute;
    top: 10px; right: 14px;
    font: 10px/1 var(--mono);
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
    pointer-events: none;
  }
  .panel.b-panel { border-color: rgba(255,255,255,.04); }

  /* ── controls ──────────────────────────────────────────────────────── */
  .controls {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    pointer-events: auto;
  }
  .hint {
    font: 11px/1 var(--mono);
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .hint b { color: var(--muted); font-weight: 500; }
  .winner-badge {
    font: 11px/1 var(--mono);
    letter-spacing: .14em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .4s ease;
  }
  .winner-badge.show { opacity: 1; }
  .winner-badge b { color: var(--hi); font-weight: 600; }

  /* ── tooltip ───────────────────────────────────────────────────────── */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(8,8,16,.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line-2);
    border-radius: 10px;
    padding: 10px 14px;
    font: 13px/1.45 var(--sans);
    color: var(--text);
    max-width: 280px;
    opacity: 0;
    transform: translate(0, -50%) translateX(14px);
    transition: opacity .15s ease;
    z-index: 90;
    box-shadow: 0 8px 36px -8px rgba(0,0,0,.7);
  }
  .tooltip.show { opacity: 1; }
  .tooltip-name {
    font: 11px/1 var(--mono);
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .tooltip-score {
    font: 28px/1 var(--mono);
    color: var(--hi);
    margin-bottom: 6px;
  }
  .tooltip-score .ab-split {
    font-size: 14px;
    color: var(--muted);
    display: block;
    margin-top: 4px;
  }
  .tooltip-desc { color: var(--muted); font-size: 12px; }

  /* ── error banner ──────────────────────────────────────────────────── */
  .err {
    width: 100%; max-width: 1280px; margin: 0 auto;
    color: #ff7686; font: 12px/1.5 var(--mono);
    text-align: center;
    min-height: 16px;
  }

  /* ── responsive ────────────────────────────────────────────────────── */
  @media (max-width: 880px) {
    main { padding-top: 76px; }
    .stage { aspect-ratio: 4 / 3; }
    .panels, .panels.ab { grid-template-columns: 1fr; }
  }
</style>
</head>

<body>

<header>
  <div class="mark">流 &nbsp; <b>kairu</b> &nbsp;·&nbsp; prism</div>
  <div class="pill-group" role="tablist" aria-label="evaluation mode">
    <button class="pill active" data-mode="single" type="button">single</button>
    <button class="pill"        data-mode="ab"     type="button">a / b</button>
  </div>
</header>

<main>
  <div class="stage" id="stage" aria-label="evaluation prism — click the prism to evaluate">
    <svg viewBox="0 0 1400 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- prism body gradient — dark glass -->
        <linearGradient id="prismFill" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0"   stop-color="#1a1c2c" stop-opacity=".95"/>
          <stop offset="1"   stop-color="#0c0d18" stop-opacity=".95"/>
        </linearGradient>
        <!-- prism rim glow -->
        <linearGradient id="prismRim" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0"   stop-color="rgba(255,255,255,.7)"/>
          <stop offset="1"   stop-color="rgba(255,255,255,.18)"/>
        </linearGradient>
        <!-- inner highlight on the top-left face of the prism -->
        <linearGradient id="prismFace" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0"   stop-color="rgba(255,255,255,.30)"/>
          <stop offset="1"   stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
        <!-- generic glow filter for beams (color set per-beam via stroke) -->
        <filter id="beamGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
        <filter id="incidentGlow" x="-10%" y="-200%" width="120%" height="500%">
          <feGaussianBlur stdDeviation="2.5"/>
        </filter>
      </defs>

      <!-- incident beam: white light entering from the left -->
      <g class="incident">
        <line x1="0" y1="350" x2="540" y2="350"
              stroke="rgba(255,255,255,.55)" stroke-width="2.5"
              filter="url(#incidentGlow)"/>
        <line x1="0" y1="350" x2="540" y2="350"
              stroke="rgba(255,255,255,.95)" stroke-width="1.2"/>
      </g>

      <!-- prism (rotates idly via the .prism-group class) -->
      <g class="prism-group" id="prismGroup">
        <!-- soft halo behind the prism -->
        <circle cx="700" cy="350" r="220" fill="rgba(255,255,255,.04)"/>
        <!-- main triangle, apex up — Floyd-style -->
        <polygon points="700,180 540,500 860,500"
                 fill="url(#prismFill)" stroke="url(#prismRim)" stroke-width="1.5"/>
        <!-- inner left-face highlight, suggesting volume -->
        <polygon points="700,180 540,500 700,500"
                 fill="url(#prismFace)" opacity=".55"/>
      </g>

      <!-- outgoing beams (8) — populated by JS so geometry stays in one place -->
      <g id="beamsA"></g>
      <g id="beamsB" style="display:none"></g>
    </svg>
  </div>

  <div class="panels" id="panels">
    <div class="panel">
      <span class="panel-tag">prompt</span>
      <textarea id="promptInput" rows="3"
                placeholder="ask anything — what is the global interpreter lock, write a haiku about the moon, explain why the sky is blue..."></textarea>
    </div>
    <div class="panel" id="responseAPanel">
      <span class="panel-tag">response</span>
      <textarea id="responseAInput" rows="3"
                placeholder="paste a model response — the prism will split it into eight readings."></textarea>
    </div>
    <div class="panel b-panel" id="responseBPanel" style="display:none">
      <span class="panel-tag">response b</span>
      <textarea id="responseBInput" rows="3"
                placeholder="paste a second response to compare — the brighter set of beams wins."></textarea>
    </div>
  </div>

  <div class="controls">
    <div class="hint"><b>click the prism</b> to split light · <span id="kbdHint">⌘ ↵</span></div>
    <div class="winner-badge" id="winner"></div>
  </div>
  <div class="err" id="err"></div>
</main>

<div class="tooltip" id="tip" role="status" aria-live="polite">
  <div class="tooltip-name" id="tipName"></div>
  <div class="tooltip-score" id="tipScore"></div>
  <div class="tooltip-desc" id="tipDesc"></div>
</div>

<script>
"use strict";

// ── canonical rubric order + colors (mirrors kairu.rubrics.RUBRIC_DEFS) ──
const RUBRICS = [
  {name:"helpfulness",  color:"#6BFF8E", desc:"Does the response address the prompt?"},
  {name:"accuracy",     color:"#9D6BFF", desc:"Concrete, on-topic, and specific."},
  {name:"safety",       color:"#4FA8FF", desc:"Penalises PII, secrets, and unsafe patterns."},
  {name:"coherence",    color:"#3DDDE6", desc:"Internally consistent, non-repetitive."},
  {name:"conciseness",  color:"#F5C84B", desc:"Length matched to the prompt."},
  {name:"creativity",   color:"#FF6BD0", desc:"Diverse, rich language."},
  {name:"groundedness", color:"#5BFFD0", desc:"Answers every named part of the prompt."},
  {name:"tone",         color:"#FF9466", desc:"Reads like well-formed prose."},
];

// ── prism geometry: beams emanate from the right face exit point ────────
const ORIGIN = { x: 780, y: 350 };
const BEAM_END_X = 1380;
const BEAM_Y_TOP = 60;
const BEAM_Y_BOTTOM = 640;
const AB_OFFSET = 8;  // perpendicular pixels between A and B beams of one rubric

// ── DOM refs ────────────────────────────────────────────────────────────
const els = {
  prism:        document.getElementById("prismGroup"),
  beamsA:       document.getElementById("beamsA"),
  beamsB:       document.getElementById("beamsB"),
  promptInput:  document.getElementById("promptInput"),
  responseA:    document.getElementById("responseAInput"),
  responseB:    document.getElementById("responseBInput"),
  bPanel:       document.getElementById("responseBPanel"),
  panels:       document.getElementById("panels"),
  err:          document.getElementById("err"),
  tip:          document.getElementById("tip"),
  tipName:      document.getElementById("tipName"),
  tipScore:     document.getElementById("tipScore"),
  tipDesc:      document.getElementById("tipDesc"),
  winner:       document.getElementById("winner"),
  kbdHint:      document.getElementById("kbdHint"),
};

let state = {
  mode: "single",  // "single" | "ab"
  scoresA: null,
  scoresB: null,
  busy: false,
};

// ── kbd hint OS-aware ───────────────────────────────────────────────────
els.kbdHint.textContent = /Mac|iPhone|iPod|iPad/.test(navigator.platform) ? "⌘ ↵" : "ctrl ↵";

// ── build the 8 beam SVG elements, lay them out evenly fan-shaped ───────
function buildBeams(group, isB) {
  group.innerHTML = "";
  const n = RUBRICS.length;
  const step = (BEAM_Y_BOTTOM - BEAM_Y_TOP) / (n - 1);
  for (let i = 0; i < n; i++) {
    const r = RUBRICS[i];
    const ty = BEAM_Y_TOP + step * i;
    // perpendicular offset: rotate (0, ±AB_OFFSET) onto the beam's normal
    const dx = BEAM_END_X - ORIGIN.x;
    const dy = ty - ORIGIN.y;
    const len = Math.hypot(dx, dy);
    const nx = -dy / len, ny = dx / len;  // unit normal
    const offset = isB ? +AB_OFFSET : (group === els.beamsA && state.mode === "ab" ? -AB_OFFSET : 0);
    const x1 = ORIGIN.x + nx * offset;
    const y1 = ORIGIN.y + ny * offset;
    const x2 = BEAM_END_X + nx * offset;
    const y2 = ty + ny * offset;
    const beam = document.createElementNS("http://www.w3.org/2000/svg", "line");
    beam.setAttribute("x1", x1); beam.setAttribute("y1", y1);
    beam.setAttribute("x2", x2); beam.setAttribute("y2", y2);
    beam.setAttribute("stroke", r.color);
    beam.setAttribute("stroke-width", "3");
    beam.setAttribute("stroke-linecap", "round");
    beam.setAttribute("filter", "url(#beamGlow)");
    beam.setAttribute("class", "beam unlit" + (isB ? " beam-pair-b" : ""));
    beam.dataset.rubric = r.name;
    beam.dataset.color  = r.color;
    beam.dataset.desc   = r.desc;
    beam.dataset.side   = isB ? "b" : "a";
    beam.addEventListener("mouseenter", onBeamEnter);
    beam.addEventListener("mousemove",  onBeamMove);
    beam.addEventListener("mouseleave", onBeamLeave);
    group.appendChild(beam);
  }
}

// ── tooltip ─────────────────────────────────────────────────────────────
function onBeamEnter(e) { showTip(e); }
function onBeamMove(e)  { positionTip(e); }
function onBeamLeave()  { els.tip.classList.remove("show"); }

function showTip(e) {
  const beam = e.currentTarget;
  const rubric = beam.dataset.rubric;
  const desc   = beam.dataset.desc;
  const color  = beam.dataset.color;
  els.tipName.textContent = rubric;
  els.tipName.style.color = color;
  els.tipDesc.textContent = desc;
  if (state.mode === "ab" && state.scoresA && state.scoresB) {
    const a = state.scoresA[rubric], b = state.scoresB[rubric];
    els.tipScore.innerHTML =
      `<span style="color:${color}">A&nbsp;${(a*100).toFixed(0)}</span>` +
      `<span style="color:#6a708a"> / </span>` +
      `<span style="color:${color};opacity:.6">B&nbsp;${(b*100).toFixed(0)}</span>`;
  } else if (state.scoresA) {
    els.tipScore.textContent = (state.scoresA[rubric] * 100).toFixed(0);
    els.tipScore.style.color = color;
  } else {
    els.tipScore.textContent = "—";
  }
  positionTip(e);
  els.tip.classList.add("show");
}

function positionTip(e) {
  const x = e.clientX + 16;
  const y = e.clientY;
  els.tip.style.left = x + "px";
  els.tip.style.top  = y + "px";
}

// ── apply scores → beam intensities + stroke widths ─────────────────────
function applyBeamIntensity(group, scores) {
  const beams = group.querySelectorAll(".beam");
  beams.forEach((beam, i) => {
    const name = beam.dataset.rubric;
    const score = scores ? scores[name] : 0;
    const opacity = scores ? Math.max(.18, score) : .12;
    const sw = scores ? (1.4 + 4.6 * score) : 2.2;
    beam.style.setProperty("--beam-opacity", opacity);
    beam.classList.toggle("lit",   !!scores);
    beam.classList.toggle("unlit", !scores);
    beam.classList.remove("beam-reveal");
    // re-trigger the reveal animation with stagger
    if (scores) {
      void beam.getBoundingClientRect();
      beam.style.animationDelay = (i * 70) + "ms";
      beam.classList.add("beam-reveal");
    }
    beam.setAttribute("stroke-width", sw.toFixed(2));
  });
}

// ── mode switching ──────────────────────────────────────────────────────
function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll(".pill").forEach(p => {
    p.classList.toggle("active", p.dataset.mode === mode);
  });
  els.bPanel.style.display = (mode === "ab") ? "" : "none";
  els.panels.classList.toggle("ab", mode === "ab");
  els.beamsB.style.display = (mode === "ab") ? "" : "none";
  els.winner.classList.remove("show");
  buildBeams(els.beamsA, false);
  buildBeams(els.beamsB, true);
  if (state.scoresA) applyBeamIntensity(els.beamsA, state.scoresA);
  if (state.scoresB && mode === "ab") applyBeamIntensity(els.beamsB, state.scoresB);
}

// ── network ─────────────────────────────────────────────────────────────
async function evaluate() {
  if (state.busy) return;
  const prompt   = els.promptInput.value.trim();
  const respA    = els.responseA.value.trim();
  const respB    = state.mode === "ab" ? els.responseB.value.trim() : "";
  if (!prompt || !respA) {
    showErr("enter a prompt and a response");
    return;
  }
  if (state.mode === "ab" && !respB) {
    showErr("a/b mode needs both responses");
    return;
  }
  state.busy = true;
  showErr("");
  flashPrism();

  const body = { prompt, response: respA };
  if (state.mode === "ab") body.response_b = respB;

  let data;
  try {
    const r = await fetch("/api/prism", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(body),
    });
    if (!r.ok) {
      const errBody = await r.json().catch(() => ({error: r.statusText}));
      throw new Error(errBody.error || `http ${r.status}`);
    }
    data = await r.json();
  } catch (e) {
    state.busy = false;
    showErr(e.message);
    return;
  }
  state.busy = false;
  applyScores(data);
}

function applyScores(data) {
  const a = {};
  for (const b of data.beams_a) a[b.rubric] = b.score;
  state.scoresA = a;
  applyBeamIntensity(els.beamsA, a);

  if (data.beams_b) {
    const b = {};
    for (const x of data.beams_b) b[x.rubric] = x.score;
    state.scoresB = b;
    applyBeamIntensity(els.beamsB, b);
    const w = data.winner;
    els.winner.innerHTML = (w === "tie")
      ? `<span style="color:var(--muted)">tie</span> · margin ${(data.margin*100).toFixed(1)}`
      : `winner <b>${w === "a" ? "A" : "B"}</b> · margin ${(data.margin*100).toFixed(1)}`;
    els.winner.classList.add("show");
  } else {
    state.scoresB = null;
    els.winner.classList.remove("show");
  }
}

function flashPrism() {
  els.prism.classList.remove("flashing");
  void els.prism.getBoundingClientRect();
  els.prism.classList.add("flashing");
}

function showErr(msg) {
  els.err.textContent = msg || "";
}

// ── interactions ────────────────────────────────────────────────────────
els.prism.addEventListener("click", evaluate);
els.prism.style.cursor = "pointer";
els.prism.style.pointerEvents = "auto";

document.querySelectorAll(".pill").forEach(p => {
  p.addEventListener("click", () => setMode(p.dataset.mode));
});

document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    evaluate();
  }
});

// ── seed examples on first load so the demo shows immediately ───────────
function seedExample() {
  els.promptInput.value =
